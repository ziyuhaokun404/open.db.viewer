name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Open.Db.Viewer.slnx

      - name: Build
        run: dotnet build Open.Db.Viewer.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Open.Db.Viewer.slnx -c Release --no-build --verbosity normal
